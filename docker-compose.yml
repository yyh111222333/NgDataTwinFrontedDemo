services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: ngdtdemo-frontend:3.0.0
    container_name: ngdtdemo-frontend
    ports:
      - '${FRONTEND_PORT:-8083}:8083'
    environment:
      PLATFORM_API_UPSTREAM: ${PLATFORM_API_UPSTREAM:-http://192.168.10.11:19080}
      ACCESS_GATEWAY_UPSTREAM: ${ACCESS_GATEWAY_UPSTREAM:-http://192.168.10.11:18050}
      CRANE_UPSTREAM: ${CRANE_UPSTREAM:-http://192.168.10.11:8000}
      MONITOR_UPSTREAM: ${MONITOR_UPSTREAM:-http://192.168.10.11:9001}
      RELAY_UPSTREAM: ${RELAY_UPSTREAM:-http://192.168.10.11:18999}
      TRAIN_BARRIER_UPSTREAM: ${TRAIN_BARRIER_UPSTREAM:-http://192.168.10.11:5001}
      SMART_MONITOR_UPSTREAM: ${SMART_MONITOR_UPSTREAM:-http://192.168.10.11:18051}
    restart: always
