services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: ngdtdemo-frontend:1.0.0
    container_name: ngdtdemo-frontend
    ports:
      - "${FRONTEND_PORT:-8083}:8083"
    restart: always

  parking:
    build:
      context: ./parking
      dockerfile: Dockerfile
    image: nangang-parking:1.0.0
    container_name: nangang-parking
    ports:
      - "${PARKING_PORT:-19080}:19080"
    environment:
      CAMERA_USERNAME: ${CAMERA_USERNAME:-admin}
      CAMERA_PASSWORD: ${CAMERA_PASSWORD:-change-me}
      PARKING_ADMIN_USERNAME: ${PARKING_ADMIN_USERNAME:-admin}
      PARKING_ADMIN_PASSWORD: ${PARKING_ADMIN_PASSWORD:-change-me}
      PARKING_AUTH_SECRET: ${PARKING_AUTH_SECRET:-replace-before-deploy}
      PARKING_CAPACITY: ${PARKING_CAPACITY:-500}
      K30_PORTAL_BASE_URL: ${K30_PORTAL_BASE_URL:-http://192.168.10.11:18050/s/personnel}
      K30_OPENAPI_BASE_URL: ${K30_OPENAPI_BASE_URL:-http://10.13.0.6:8050}
      K30_COMPANY_NO: ${K30_COMPANY_NO:-1780491840740664}
      K30_DEFAULT_DEPARTMENT_NO: ${K30_DEFAULT_DEPARTMENT_NO:-1782540952786460}
      K30_APP_SECRET: ${K30_APP_SECRET:-}
      K30_AES_KEY: ${K30_AES_KEY:-}
      K30_AES_IV: ${K30_AES_IV:-}
      TZ: Asia/Shanghai
    volumes:
      - parking-data:/data
    restart: always

volumes:
  parking-data:
