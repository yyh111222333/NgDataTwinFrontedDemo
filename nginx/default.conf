server {
    listen 8083;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Existing subsystem shortcuts.
    location = /s/personnel {
        return 302 /s/personnel/;
    }

    location = /s/vehicle {
        return 302 /s/vehicle/;
    }

    location = /s/crane {
        return 302 /s/crane/;
    }

    location ^~ /s/personnel/ {
        proxy_pass http://192.168.10.11:18050;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:18050;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://192.168.10.11:18050/ /s/personnel/;
        proxy_redirect http://10.13.0.8:18050/ /s/personnel/;
    }

    location ^~ /s/vehicle/ {
        proxy_pass http://192.168.10.11:18050;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:18050;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://192.168.10.11:18050/ /s/vehicle/;
        proxy_redirect http://10.13.0.8:18050/ /s/vehicle/;
    }

    location ^~ /s/crane/ {
        proxy_pass http://192.168.10.11:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header If-Modified-Since "";
        proxy_set_header If-None-Match "";
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter './app.js' './app.js?v=$msec';
        sub_filter './styles.css' './styles.css?v=$msec';
        proxy_redirect http://192.168.10.11:8000/ /s/crane/;
        proxy_redirect http://10.13.0.8:8000/ /s/crane/;
    }

    # Stable same-origin gateway entries used by the cockpit footer menu.
    location = /gateway/personnel {
        return 302 /gateway/personnel/;
    }

    location = /gateway/vehicle {
        return 302 /gateway/vehicle/;
    }

    location = /gateway/crane {
        return 302 /gateway/crane/;
    }

    location = /gateway/monitor {
        return 302 /gateway/monitor/;
    }

    location ^~ /gateway/personnel/ {
        proxy_pass http://192.168.10.11:18050/s/personnel/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:18050;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://192.168.10.11:18050/s/personnel/ /gateway/personnel/;
        proxy_redirect http://10.13.0.8:18050/s/personnel/ /gateway/personnel/;
        proxy_redirect http://192.168.10.11:18050/ /gateway/personnel/;
        proxy_redirect http://10.13.0.8:18050/ /gateway/personnel/;
    }

    location ^~ /gateway/vehicle/ {
        proxy_pass http://192.168.10.11:18050/s/vehicle/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:18050;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://192.168.10.11:18050/s/vehicle/ /gateway/vehicle/;
        proxy_redirect http://10.13.0.8:18050/s/vehicle/ /gateway/vehicle/;
        proxy_redirect http://192.168.10.11:18050/ /gateway/vehicle/;
        proxy_redirect http://10.13.0.8:18050/ /gateway/vehicle/;
    }

    location ^~ /gateway/crane/ {
        proxy_pass http://192.168.10.11:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://192.168.10.11:8000/ /gateway/crane/;
        proxy_redirect http://10.13.0.8:8000/ /gateway/crane/;
    }

    # The monitoring dashboard uses root-relative /static paths and websocket
    # media ports, so the footer opens it on the current host's 9001 port.
    location ^~ /gateway/monitor/ {
        proxy_pass http://192.168.10.11:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:9001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://192.168.10.11:9001/ /gateway/monitor/;
        proxy_redirect http://10.13.0.8:9001/ /gateway/monitor/;
    }

    location ^~ /relay-api/ {
        proxy_pass http://192.168.10.11:18999/api/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.168.10.11:18999;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://192.168.10.11:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://192.168.10.11:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
