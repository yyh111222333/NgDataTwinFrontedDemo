server {
    listen 8083;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /s/personnel {
        return 302 /s/personnel/;
    }

    location = /s/vehicle {
        return 302 /s/vehicle/;
    }

    location = /s/crane {
        return 302 /s/crane/;
    }

    location ^~ /s/personnel/ {
        proxy_pass http://10.13.0.8:18050;
        proxy_http_version 1.1;
        proxy_set_header Host 10.13.0.8:18050;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://10.13.0.8:18050/ /;
    }

    location ^~ /s/vehicle/ {
        proxy_pass http://10.13.0.8:18050;
        proxy_http_version 1.1;
        proxy_set_header Host 10.13.0.8:18050;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://10.13.0.8:18050/ /;
    }

    location ^~ /s/crane/ {
        proxy_pass http://10.13.0.8:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host 10.13.0.8:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header If-Modified-Since "";
        proxy_set_header If-None-Match "";
        proxy_set_header Accept-Encoding "";
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter './app.js' './app.js?v=$msec';
        sub_filter './styles.css' './styles.css?v=$msec';
        proxy_redirect http://10.13.0.8:8000/ /s/crane/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /relay-api/ {
        proxy_pass http://10.13.0.8:18999/api/;
        proxy_http_version 1.1;
        proxy_set_header Host 10.13.0.8:18999;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://101.43.49.78:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://101.43.49.78:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
